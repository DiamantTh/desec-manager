# DeSEC Manager — Sicherheitskonfiguration
# ACHTUNG: encryption_key hochsensitiv — ausschließlich über ENCRYPTION_KEY-Umgebungsvariable
# oder in config.local.toml (gitignored) setzen, niemals in dieser Datei committen.

[security]
# 32 Byte hex-kodierter Schlüssel für XSalsa20-Poly1305-Verschlüsselung (via libsodium).
# Erzeugen: php -r "echo sodium_bin2hex(random_bytes(32));"
encryption_key = ""

# Argon2id-Parameter (OWASP-Empfehlungen — nicht ohne Grund anpassen)
[security.password]
algo        = "argon2id"
memory_cost = 65536   # 64 MB
time_cost   = 4       # 4 Iterationen
threads     = 2

# Session-Cookie-Sicherheitsflags
[security.session]
secure   = true        # Nur über HTTPS senden
httponly = true        # Kein JavaScript-Zugriff auf Cookie
samesite = "Strict"   # CSRF-Schutz via SameSite
lifetime = 3600       # Session-Gültigkeit in Sekunden (1 Stunde)

# Rate-Limiting für den Login-Endpunkt (APCu-basiert)
[security.rate_limit]
login_max_attempts   = 10    # Maximale Fehlversuche pro IP
login_window_seconds = 900   # Beobachtungszeitraum in Sekunden (15 Minuten)

# ===========================================================================
# FIDO2 / WebAuthn
# ===========================================================================
# user_verification: "required" erzwingt PIN oder Biometrie (UV-Flag muss
#   gesetzt sein). "preferred" fragt danach, akzeptiert aber auch Nein.
#   "discouraged" deaktiviert UV komplett — NICHT empfohlen.
#
# require_resident_key: true → Passkey/Discoverable Credential (im Key gespeichert),
#   ermöglicht username-losen Login.
#
# algorithms: Priorisierung nach Sicherheit — Ed25519 (EdDSA/-8) bevorzugt,
#   dann ES256 (-7). RS256 (-257) nur für Legacy-Authenticatoren als Fallback.
#
# attestation: "direct" → der Authenticator liefert sein Zertifikat mit
#   (ermöglicht AAGUID-basierte Geräteidentifikation).
#   "none" wenn kein Gerätenachweis benötigt wird.
#
# challenge_bytes: Länge der Challenge in Bytes (≥ 16 laut Spec, 32 empfohlen).
#
# timeout_ms: Browser-Timeout für den Authenticator-Dialog in Millisekunden.
[security.fido2]
user_verification   = "required"    # UV zwingend → PIN oder Biometrie
require_resident_key = true          # Passkey-Modus (Discoverable Credential)
algorithms          = [-8, -7, -257] # EdDSA (Ed25519), ES256, RS256
attestation         = "direct"       # AAGUID-Identifikation ermöglichen
challenge_bytes     = 32             # 256 Bit Challenge
timeout_ms          = 60000          # 60 Sekunden Browser-Timeout

# ===========================================================================
# TOTP (Time-based One-Time Password, RFC 6238)
# ===========================================================================
# digits: 8 statt des üblichen Standards von 6 — signifikant höhere Entropie
#   (10^8 = 100 Mio statt 10^6 = 1 Mio mögliche Codes).
#
# algorithm: sha256 oder sha512 — beide von Google Authenticator, Aegis,
#   andOTP unterstützt. sha1 ist RFC-Standard aber schwächer – hier nicht verwendet.
#
# period: 30 Sekunden (RFC-Standard) — 60 nur wenn Nutzer Schwierigkeiten haben.
#
# secret_bytes: Länge des TOTP-Secrets in Bytes. Standard = 20 (SHA1, 160 Bit).
#   Hier 32 Bytes = 256 Bit für SHA-256, oder 64 Bytes = 512 Bit für SHA-512.
#   Der Base32-kodierte QR-Code wird dadurch länger, aber alle modernen Apps
#   unterstützen das.
#
# window: Erlaubtes Zeitfenster links/rechts vom aktuellen Code (+/- N Perioden).
#   1 = ±30 Sekunden Toleranz (empfohlen für Uhrenabweichung).
[security.totp]
digits       = 8       # 8-stellige Codes
algorithm    = "sha256" # SHA-256 (stärker als SHA-1)
period       = 30      # Gültigkeitszeitraum in Sekunden
secret_bytes = 32      # 32 Bytes = 256 Bit Secret
window       = 1       # ±1 Periode Toleranz (für Uhren-Drift)
