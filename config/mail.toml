# DeSEC Manager — E-Mail-Konfiguration (Symfony Mailer)
# Passwort wird aus der Umgebungsvariable MAIL_PASSWORD gelesen (nicht hier speichern).
#
# transport-Wert ist ein Symfony-Mailer-DSN oder ein Kurzname:
#   "smtp"    — SMTP (Einstellungen aus [mail.smtp])
#   "sendmail" — lokales sendmail-Binary
#   Vollständige DSNs (API-Transporte, kein Passwort-Handling hier nötig):
#   "ses+smtp://ACCESS_KEY:SECRET_KEY@default"
#   "sendgrid+api://API_KEY@default"
#   "mailgun+api://API_KEY:DOMAIN@default"
#   "postmark+api://API_KEY@default"

[mail]
transport    = "smtp"
from_address = ""               # Absender-E-Mail-Adresse
from_name    = "DeSEC Manager"

# SMTP-Transport-Einstellungen (nur relevant wenn transport = "smtp")
[mail.smtp]
host       = "localhost"
port       = 587
encryption = "tls"              # "tls" (STARTTLS), "ssl" (SMTPS) oder "" (kein TLS)
username   = ""                 # SMTP-Benutzername (Passwort via MAIL_PASSWORD-Env)
