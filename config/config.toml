# ============================================================
# DeSEC Manager — Hauptkonfiguration
# ============================================================
# Diese Datei enthält ausschließlich Bootstrap-Werte:
#   - Einstellungen, die VOR der Datenbankverbindung benötigt werden
#   - Sicherheits-kritische Werte, die zur Laufzeit nicht änderbar sein sollen
#
# Alles was im Admin-Interface konfigurierbar ist, steht in der DB (settings-Tabelle):
#   → Mail-Absender, App-Name, Theme, Cache-Adapter, Rate-Limits,
#     FIDO2-Parameter, TOTP-Parameter, Registrierungsfreigabe etc.
#
# 2 Konfigurationsdateien:
#   config.toml    — Bootstrap (diese Datei)
#   database.toml  — DB-Verbindungsparameter
#
# Lokale Überschreibungen (gitignored):
#   config.local.toml  — kopieren aus docs/config/config.local.toml.example
#
# Secrets ausschließlich via Umgebungsvariablen oder config.local.toml:
#   ENCRYPTION_KEY  — 32-Byte-Key (hex): php -r "echo sodium_bin2hex(random_bytes(32));"
# ============================================================

# ------------------------------------------------------------
# Anwendung
# domain: Pflicht für WebAuthn (RP-ID) und CSRF-Origin-Prüfung.
#   WebAuthn wird automatisch aktiviert, wenn domain gesetzt ist.
#   Ohne gültige Domain + HTTPS bleibt WebAuthn deaktiviert.
# ------------------------------------------------------------
[app]
domain      = ""      # z.B. "manager.example.com" — Pflicht für WebAuthn + HTTPS-Origin
force_https = true
debug       = false

# ------------------------------------------------------------
# Cache (PSR-16 via symfony/cache) — Bootstrap-Adapter-Auswahl
#
# Genau einen Adapter aktivieren (kommentiere die anderen Sektionen aus).
# Den aktiven Adapter kann der Admin zusätzlich im Interface wählen;
# diese Datei bestimmt den Fallback beim ersten Start.
#
# Shared Hosting:  "filesystem" (immer verfügbar) oder "apcu" (wenn ext-apcu aktiv)
# VPS/Dedicated:   "redis" oder "memcached"
# Nur Tests:       "array"
# ------------------------------------------------------------
[cache]
adapter   = "filesystem"   # filesystem | apcu | redis | memcached | array
namespace = "desec"
ttl       = 3600            # Standard-TTL in Sekunden

# Aktiv wenn adapter = "filesystem"
[cache.filesystem]
path = "var/cache"          # Relativ zum Projekt-Root — muss beschreibbar sein

# Auskommentieren und adapter = "redis" setzen um Redis zu aktivieren:
# [cache.redis]
# host     = "127.0.0.1"
# port     = 6379
# password = ""              # Leer lassen wenn kein Auth; besser via Umgebungsvariable
# database = 0

# Auskommentieren und adapter = "memcached" setzen um Memcached zu aktivieren:
# [cache.memcached]
# host = "127.0.0.1"
# port = 11211

# ------------------------------------------------------------
# Sicherheit — ausschließlich Bootstrap-Werte
# Zur Laufzeit änderbare Sicherheitseinstellungen (Rate-Limits, FIDO2-Parameter,
# TOTP-Parameter) werden im Admin-Interface konfiguriert (settings-Tabelle).
# ------------------------------------------------------------
[security]
# 32 Byte hex-kodierter Schlüssel für Verschlüsselung (libsodium XSalsa20-Poly1305).
# Erzeugen: php -r "echo sodium_bin2hex(random_bytes(32));"
# Zwingend via ENCRYPTION_KEY-Umgebungsvariable oder config.local.toml setzen.
encryption_key = ""

# Argon2id (Passwort-Hashing) — OWASP 2024-Empfehlung
# memory_cost = 128 MB, time_cost = 4, threads = 4
# Erhöhen bei verfügbaren Ressourcen; niemals senken (bricht bestehende Passwörter nicht —
# PHP re-hasht beim nächsten Login automatisch wenn PASSWORD_REHASH notwendig).
[security.password]
memory_cost = 131072   # 128 MB (OWASP 2024: ≥ 64 MB empfohlen, 128 MB bevorzugt)
time_cost   = 4        # 4 Iterationen
threads     = 4        # Parallele Threads

# Session-Cookie (sicherheitskritisch — nicht via Interface änderbar)
[security.session]
secure   = true      # Nur über HTTPS — lokal: false in config.local.toml
httponly = true      # Kein JavaScript-Zugriff
samesite = "Strict"  # CSRF-Schutz durch SameSite
lifetime = 3600      # Sekunden (1 Stunde)

# Sentry: DSN via SENTRY_DSN-Umgebungsvariable — keine Config hier nötig.
