# DeSEC Manager — Apache 2.4 Relevante Direktiven
#
# Diese Direktiven gehören in den <Directory>-Block des VirtualHost
# (als Fallback / Ergänzung zur .htaccess, falls AllowOverride eingeschränkt ist)
# oder direkt in eine server-weite Apache-Konfigurationsdatei.
#
# Voraussetzung: a2enmod rewrite headers

# ── Verzeichnis-Schutz (Fallback wenn AllowOverride None) ────────────────────
# Sensible Verzeichnisse sperren — das erledigt im Normalfall die .htaccess,
# aber der VirtualHost sollte es zusätzlich erzwingen.

<DirectoryMatch "/var/www/desec-manager/(src|config|vendor|locale|app|tests|sql|var)">
    Require all denied
</DirectoryMatch>

# Kein Verzeichnis-Listing, keine Server-Signatur
<Directory "/var/www/desec-manager">
    Options -Indexes -MultiViews
    AllowOverride All
    Require all granted
</Directory>

# ── Routing (Alternative zur .htaccess, falls AllowOverride None) ─────────────
# Installer direkt erreichbar lassen
RewriteRule ^install(/.*)?$  install/index.php  [QSA,L]

# Statische Dateien und echte Verzeichnisse direkt ausliefern
RewriteCond %{REQUEST_FILENAME} -f  [OR]
RewriteCond %{REQUEST_FILENAME} -d
RewriteRule ^ - [L]

# Alle anderen Anfragen → index.php (Front-Controller)
RewriteRule ^ index.php [QSA,L]

# ── Sicherheits-Header ────────────────────────────────────────────────────────
# Ergänzen / überschreiben die .htaccess-Header auf VirtualHost-Ebene.
# HSTS nur bei HTTPS aktivieren (Kommentar entfernen).

Header always set X-Content-Type-Options  "nosniff"
Header always set X-Frame-Options         "SAMEORIGIN"
Header always set Referrer-Policy         "strict-origin-when-cross-origin"
Header always set X-XSS-Protection        "0"
Header always set Permissions-Policy      "camera=(), microphone=(), geolocation=()"
# Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

# ── Sensible Dateitypen / Metadateien blockieren ──────────────────────────────
<FilesMatch "^(\.env|composer\.(json|lock)|phpstan\.neon|\.gitignore|README\.md)$">
    Require all denied
</FilesMatch>
