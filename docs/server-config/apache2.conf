# DeSEC Manager — Apache 2.4 Server-Konfiguration
#
# Voraussetzungen:
#   a2enmod rewrite headers ssl
#   a2ensite desec-manager
#
# Pfade anpassen:
#   /var/www/desec-manager  →  tatsächlicher Projektpfad
#   desec.example.com       →  eigene Domain
#   /etc/letsencrypt/...    →  eigene Zertifikatspfade

# ── HTTP: Weiterleitung auf HTTPS ─────────────────────────────────────────────
<VirtualHost *:80>
    ServerName  desec.example.com
    ServerAlias www.desec.example.com

    # Alle Anfragen auf HTTPS umleiten
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS: Haupt-VirtualHost ──────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName  desec.example.com
    ServerAlias www.desec.example.com

    # Projektverzeichnis als Document-Root (kein public/-Unterordner nötig)
    DocumentRoot /var/www/desec-manager

    # PHP-FPM (Socket-Variante, Pfad ggf. anpassen)
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Verzeichnis-Optionen
    <Directory /var/www/desec-manager>
        Options -Indexes -MultiViews FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Sensible Verzeichnisse explizit sperren (Fallback falls .htaccess deaktiviert)
    <DirectoryMatch "/var/www/desec-manager/(src|config|vendor|locale|app|tests|sql|var)">
        Require all denied
    </DirectoryMatch>

    # SSL-Zertifikate (Let's Encrypt-Beispiel)
    SSLEngine on
    SSLCertificateFile     /etc/letsencrypt/live/desec.example.com/fullchain.pem
    SSLCertificateKeyFile  /etc/letsencrypt/live/desec.example.com/privkey.pem

    # Moderne TLS-Konfiguration (Apache 2.4.36+)
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # Sicherheits-Header (ergänzen die .htaccess-Header)
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-Frame-Options           "SAMEORIGIN"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"
    Header always set X-XSS-Protection          "0"
    Header always set Permissions-Policy        "camera=(), microphone=(), geolocation=()"

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/desec-manager_error.log
    CustomLog ${APACHE_LOG_DIR}/desec-manager_access.log combined
</VirtualHost>

