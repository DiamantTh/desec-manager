# DeSEC Manager — nginx Relevante Direktiven
#
# Die folgenden location-Blöcke und add_header-Direktiven gehören in den
# server { ... }-Block des VirtualHost. nginx kennt keine .htaccess —
# die Regeln müssen deshalb direkt in der nginx-Konfiguration stehen.
#
# root  /var/www/desec-manager;
# index index.php;

# ── Schutz sensibler Verzeichnisse ────────────────────────────────────────────
# Äquivalent zu den einzelnen .htaccess-Dateien in src/, config/, vendor/ etc.

location ~ ^/(src|config|vendor|locale|app|tests|sql|var)(/|$) {
    deny all;
    return 403;
}

# Versteckte Dateien (.git, .env …) und Metadateien nie ausliefern
location ~ /\. {
    deny all;
}
location ~ \.(md|neon|lock|dist|gitignore|gitattributes)$ {
    deny all;
    return 403;
}

# ── Routing (Äquivalent zur Root-.htaccess RewriteRule) ───────────────────────

# Installer direkt erreichbar lassen
location ^~ /install {
    try_files $uri /install/index.php$is_args$args;
}

# Statische Assets mit Cache-Header ausliefern
location ^~ /assets {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

location ^~ /themes {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

# Alle anderen Anfragen → index.php (Front-Controller)
location / {
    try_files $uri $uri/ /index.php$is_args$args;
}

# PHP-FPM
location ~ \.php$ {
    try_files      $uri =404;   # Sicherheit: keine nicht-existierenden PHP-Pfade
    fastcgi_pass   unix:/run/php/php8.4-fpm.sock;   # Pfad ggf. anpassen
    fastcgi_index  index.php;
    include        fastcgi_params;
    fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_param  PATH_INFO $fastcgi_path_info;
}

# ── Sicherheits-Header ────────────────────────────────────────────────────────
# HSTS nur bei HTTPS aktivieren (Kommentar entfernen)

add_header X-Content-Type-Options  "nosniff"                         always;
add_header X-Frame-Options         "SAMEORIGIN"                      always;
add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection        "0"                               always;
add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
