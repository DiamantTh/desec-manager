# DeSEC Manager — nginx Konfiguration
#
# Voraussetzungen:
#   apt install nginx php8.4-fpm
#
# Aktivieren:
#   ln -s /etc/nginx/sites-available/desec-manager /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Pfade anpassen:
#   /var/www/desec-manager  →  tatsächlicher Projektpfad
#   desec.example.com       →  eigene Domain

# ── HTTP: Weiterleitung auf HTTPS ─────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name desec.example.com www.desec.example.com;

    return 301 https://$host$request_uri;
}

# ── HTTPS: Haupt-Server-Block ─────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;

    server_name desec.example.com www.desec.example.com;

    # Projektverzeichnis als Root (kein public/-Unterordner nötig)
    root  /var/www/desec-manager;
    index index.php;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/desec.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/desec.example.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Sicherheits-Header ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header X-XSS-Protection          "0"                                    always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Schutz sensibler Verzeichnisse ────────────────────────────────────────
    # PHP-Quellcode, Konfiguration, vendor/, Locale-Dateien etc. werden verweigert
    location ~ ^/(src|config|vendor|locale|app|tests|sql|var)(/|$) {
        deny all;
        return 403;
    }

    # Versteckte Dateien und Konfigurationsdateien blockieren
    location ~ /\. {
        deny all;
    }
    location ~ \.(md|neon|lock|json|dist|gitignore|gitattributes)$ {
        deny all;
        return 403;
    }

    # ── Routing ───────────────────────────────────────────────────────────────
    # Installer direkt
    location ^~ /install {
        try_files $uri /install/index.php$is_args$args;
    }

    # Statische Assets direkt ausliefern
    location ^~ /assets {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Themes-Assets (CSS/JS)
    location ^~ /themes {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Alle anderen Anfragen → index.php (Front-Controller)
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        # Sicherheit: nur existierende PHP-Dateien verarbeiten
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # PHP-FPM Socket (Pfad ggf. anpassen)
        fastcgi_pass   unix:/run/php/php8.4-fpm.sock;
        fastcgi_index  index.php;

        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;

        # Timeouts
        fastcgi_read_timeout    60;
        fastcgi_connect_timeout 10;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/desec-manager_access.log;
    error_log  /var/log/nginx/desec-manager_error.log;
}

